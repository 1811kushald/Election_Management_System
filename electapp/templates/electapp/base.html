<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Bootstrap -->
      <!-- Latest compiled and minified CSS -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">

      <!-- Optional theme -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap-theme.min.css" integrity="sha384-6pzBo3FDv/PJ8r2KRkGHifhEocL+1X2rVCTTkUfGk7/0pbek5mMa1upzvWbrUbOZ" crossorigin="anonymous">

    
    <!-- Custom Css -->
        <link rel="stylesheet" href="{% static 'css/blog.css' %}">


    <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Russo+One&display=swap" rel="stylesheet">
</head>
<body>
    <div>
        <div>
        <!-- navbar -->
        <nav class="navbar navbar-default navbar-fixed-top techfont">
            <div class="container-fluid">
                <div class="navbar-header">
                    <a class="navbar-brand bigbrand" href="{% url 'election_list' %}">Electrol</a>
                </div>
                <ul class="nav navbar-nav">
                    <li><a href="{% url 'about' %}">About</a></li>
                </ul>
                <ul class="nav navbar-nav navbar-right">
                    {% if user.is_authenticated %}
                        <li><a href="{% url  'create_election' %}">New Election</a></li>
                        <li> <a href="{% url 'logout_page' %}">Logout</a></li>
                        <li><a href="#">Welcome:{{user.username}}</a></li>
                    {%else%}
                        <li><a href="{% url 'login' %}">Login</a></li>
                    {% endif%}           
                </ul>
            </div>
        </nav>
        </div>
        <!-- Content Block -->
        <div class="container" style="margin-top: 70px;">
                {% block content%}
                {% endblock%}
        </div>
    </div>  
</body>
</html>
